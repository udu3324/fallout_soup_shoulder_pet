<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Soup Control Panel</title>
  <style>
    body {
      background-color: #F1E3D7;
      color: #8C6665;
    }

    button {
      color: #8C6665;
      -webkit-user-select: none;
      /* Safari */
      -moz-user-select: none;
      /* Firefox */
      -ms-user-select: none;
      /* IE10+/Edge */
      user-select: none;
      /* Standard */
    }

    .bigb {
      padding: 5px;
      width: 50px;
      height: 50px;
      font-weight: bold;
    }

    fieldset {
      border: #8C6665 0px solid;
      background: #DAC5BA;
    }

    legend {
      background: #8C6665;
      color: #ffffff;
      padding: 3px 15px 3px 15px;
    }

    #lr-angle,
    #ud-angle {
      pointer-events: none;
      outline: none;
      width: 50px;
    }

    /* 1. Target the box containing the camera stream to prevent page expansion */
    fieldset:has(#stream) > div {
      width: 100%;
      max-width: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* 2. Modern, layout-safe rotation and scale rules for the image */
    .camera {
      /* Force it to fill the entire container width */
      width: 100%; 
      height: auto;
      display: block;
      
      transform: rotate(90deg);
      
      object-fit: contain;
      writing-mode: unset;
      margin: 15% 0; 
    }

    .selectedbt {
      color: #ffffff;
      background-color: #8C6665;
    }

    .voice-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .voice-line {
      min-height: 34px;
      max-width: 180px;
      overflow-wrap: anywhere;
    }

    .voice-status {
      margin-top: 8px;
      font-size: 0.9em;
    }

    #voice-files {
      display: none;
    }
  </style>
</head>

<script>
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
  const wsHost = window.location.host || '192.168.4.1'
  let ws = null
  let reconnectTimer = null

  function connectWebSocket() {
    ws = new WebSocket(`${wsProtocol}//${wsHost}/ws`);

    ws.onopen = function () {
      console.log("WebSocket connected");
    };
    ws.onclose = function () {
      console.log("WebSocket closed");
      scheduleReconnect();
    };
    ws.onerror = function (error) {
      console.log("WebSocket error: " + error);
    };
    ws.onmessage = handleWebSocketMessage;
  }

  function scheduleReconnect() {
    if (reconnectTimer !== null) {
      return
    }

    reconnectTimer = setTimeout(() => {
      reconnectTimer = null
      connectWebSocket()
    }, 2000)
  }

  function handleWebSocketMessage(event) { // handle this <---------------------------
    console.log("WebSocket message: " + event.data);

    if (event.data instanceof Blob) {
      const imgElem = document.getElementById('stream')

      if (imgElem.src.startsWith('blob:')) {
        URL.revokeObjectURL(imgElem.src)
      }

      imgElem.src = URL.createObjectURL(event.data)
      return
    }

    if (typeof event.data !== 'string') {
      return
    }

    if (event.data.includes("servoX-")) {
      document.getElementById('lr-angle').value = event.data.slice(7)
    }
    if (event.data.includes("servoY-")) {
      document.getElementById('ud-angle').value = event.data.slice(7)
    }
    if (event.data.includes("hTouch-")) {
      let bool = event.data === "hTouch-true"
      document.getElementById('touch1').checked = bool
    }
    if (event.data.startsWith("voice:")) {
      playVoiceLine(decodeURIComponent(event.data.slice(6)))
    }

  }

  connectWebSocket()

  function sendMessage(message) {
    if (ws === null || ws.readyState !== WebSocket.OPEN) {
      console.log("WebSocket not connected, skipped: " + message);
      return false
    }

    console.log("WebSocket sent: " + message);
    ws.send(message);
    return true
  }

  const voiceDbName = 'soup-voice-lines'
  const voiceStoreName = 'lines'
  const voiceLines = new Map()
  const decodedVoiceLines = new Map()
  let audioContext = null
  let audioUnlocked = false

  function setVoiceStatus(message) {
    document.getElementById('voice-status').textContent = message
  }

  function getAudioContext() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext

    if (!AudioContextClass) {
      return null
    }
    if (audioContext === null) {
      audioContext = new AudioContextClass()
    }

    return audioContext
  }

  async function unlockAudio() {
    const context = getAudioContext()

    if (context === null) {
      setVoiceStatus('This browser does not support Web Audio.')
      return false
    }

    if (context.state === 'suspended') {
      await context.resume()
    }

    if (!audioUnlocked) {
      const source = context.createBufferSource()
      source.buffer = context.createBuffer(1, 1, 22050)
      source.connect(context.destination)
      source.start(0)
      audioUnlocked = true
    }

    return context.state === 'running'
  }

  function openVoiceDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(voiceDbName, 1)

      request.onupgradeneeded = () => {
        request.result.createObjectStore(voiceStoreName, { keyPath: 'name' })
      }
      request.onsuccess = () => resolve(request.result)
      request.onerror = () => reject(request.error)
    })
  }

  async function runVoiceStore(mode, action) {
    const db = await openVoiceDb()

    return new Promise((resolve, reject) => {
      const tx = db.transaction(voiceStoreName, mode)
      const store = tx.objectStore(voiceStoreName)
      const result = action(store)

      tx.oncomplete = () => {
        db.close()
        resolve(result)
      }
      tx.onerror = () => {
        db.close()
        reject(tx.error)
      }
    })
  }

  async function loadVoiceLines() {
    const lines = await runVoiceStore('readonly', (store) => {
      return new Promise((resolve, reject) => {
        const request = store.getAll()

        request.onsuccess = () => resolve(request.result)
        request.onerror = () => reject(request.error)
      })
    })

    voiceLines.clear()
    decodedVoiceLines.clear()

    lines
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach((line) => voiceLines.set(line.name, line))

    renderVoiceLines()
  }

  function renderVoiceLines() {
    const buttons = document.getElementById('voice-buttons')
    buttons.replaceChildren()

    if (voiceLines.size === 0) {
      setVoiceStatus('No voice lines installed on this phone.')
      return
    }

    setVoiceStatus(`${voiceLines.size} voice line(s) installed on this phone.`)

    voiceLines.forEach((line) => {
      const button = document.createElement('button')
      button.className = 'voice-line'
      button.textContent = line.name.replace(/\.[^/.]+$/, '')
      button.onclick = () => triggerVoiceLine(line.name)
      buttons.appendChild(button)
    })
  }

  function pickVoiceLines() {
    unlockAudio()
    document.getElementById('voice-files').click()
  }

  async function importVoiceLines(event) {
    const files = Array.from(event.target.files)

    if (files.length === 0) {
      return
    }

    await unlockAudio()
    setVoiceStatus(`Importing ${files.length} voice line(s)...`)

    const lines = []

    for (const file of files) {
      lines.push({
        name: file.name,
        type: file.type || 'audio/mpeg',
        buffer: await file.arrayBuffer()
      })
    }

    await runVoiceStore('readwrite', (store) => {
      for (const line of lines) {
        store.put(line)
      }
    })

    event.target.value = ''
    await loadVoiceLines()
  }

  async function clearVoiceLines() {
    await runVoiceStore('readwrite', (store) => store.clear())
    voiceLines.clear()
    decodedVoiceLines.clear()
    renderVoiceLines()
  }

  async function getDecodedVoiceLine(name) {
    if (decodedVoiceLines.has(name)) {
      return decodedVoiceLines.get(name)
    }

    const line = voiceLines.get(name)
    const context = getAudioContext()

    if (!line || context === null) {
      return null
    }

    const audioBuffer = await decodeVoiceLine(context, line.buffer.slice(0))
    decodedVoiceLines.set(name, audioBuffer)

    return audioBuffer
  }

  function decodeVoiceLine(context, buffer) {
    return new Promise((resolve, reject) => {
      const result = context.decodeAudioData(buffer, resolve, reject)

      if (result) {
        result.then(resolve).catch(reject)
      }
    })
  }

  async function playVoiceLine(name) {
    if (!voiceLines.has(name)) {
      setVoiceStatus(`Missing voice line on this phone: ${name}`)
      return
    }

    if (!await unlockAudio()) {
      setVoiceStatus('Audio is blocked. Tap Import Voice Lines once to enable it.')
      return
    }

    const context = getAudioContext()
    let audioBuffer = null

    try {
      audioBuffer = await getDecodedVoiceLine(name)
    } catch (error) {
      console.log('Voice line decode error: ', error)
      setVoiceStatus(`Could not decode voice line: ${name}`)
      return
    }

    if (audioBuffer === null) {
      setVoiceStatus(`Could not play voice line: ${name}`)
      return
    }

    const source = context.createBufferSource()
    source.buffer = audioBuffer
    source.connect(context.destination)
    source.start(0)
  }

  async function triggerVoiceLine(name) {
    await unlockAudio()
    sendMessage(`voice:${encodeURIComponent(name)}`)
  }

  async function testLocalVoiceLine() {
    const firstLine = voiceLines.keys().next()

    if (firstLine.done) {
      setVoiceStatus('No voice lines installed on this phone.')
      return
    }

    await playVoiceLine(firstLine.value)
  }

  document.getElementById('voice-files').addEventListener('change', importVoiceLines)
  loadVoiceLines().catch((error) => {
    console.log('Voice line storage error: ', error)
    setVoiceStatus('Could not load voice lines on this phone.')
  })

  let timerU
  let timerD
  let timerL
  let timerR

  function stopTimer(timer) {
    clearTimeout(timer)

  let timerLive = null
  function toggleLive() {
    if (timerLive === null) {
      document.getElementById('livebtn').classList.add('selectedbt')

      sendMessage('capture')

      timerLive = setTimeout(() => {
        timerLive = setInterval(() => sendMessage('capture'), 500)
      }, 500)
    } else {
      clearTimeout(timerLive)
      clearInterval(timerLive)
      timerLive = null

      document.getElementById('livebtn').classList.remove('selectedbt')
    }
  }

  function save() {
    let imgElem = document.getElementById('stream')

    // 1. Create a canvas element
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    // 2. Set canvas dimensions to match the image's actual size
    canvas.width = imgElem.naturalWidth;
    canvas.height = imgElem.naturalHeight;

    // 3. Draw the image onto the canvas
    ctx.drawImage(imgElem, 0, 0);

    // 4. Convert the canvas content to a JPEG data URL (quality: 0.9)
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

    // 5. Create a temporary link element to trigger the download
    const link = document.createElement('a');
    link.download = `soup database (${new Date()}).jpeg`;
    link.href = dataUrl;

    // 6. Programmatically click the link to start the download, then clean up
    link.click();
  }
